<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical Chatbot</title>

<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/chat.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* EXTEND CHAT WIDTH */
.login-card{
    width: 900px;
    max-width: 95%;
}

/* CHAT AREA */
.chat-area{
    height: 420px;
    overflow-y: auto;
    padding: 20px;
}

/* MESSAGE STYLE */
.message{
    max-width:70%;
    padding:12px 16px;
    margin:10px 0;
    border-radius:10px;
    line-height:1.5;
}

.user{
    background:#2f80ed;
    color:white;
    margin-left:auto;
}

.bot{
    background:#f1f1f1;
}

/* SUGGESTIONS */
.suggestions{
    padding:10px 20px;
}

.suggestion-btn{
    padding:8px 14px;
    margin:5px;
    border:none;
    border-radius:20px;
    background:#e6f0ff;
    cursor:pointer;
}

.suggestion-btn:hover{
    background:#cfe0ff;
}

/* BULLET FORMAT INSIDE BOT MESSAGE */
.bot ul{
    margin:5px 0 5px 18px;
}

</style>
</head>

<body>

<div class="background-overlay">

<a href="/login" class="logout-btn">Logout</a>

<div class="login-card">

<!-- HEADER -->
<div class="header">

<div class="logo">
<span class="cross-icon">✚</span>
<span class="logo-text">WELCOME TO MEDICARE <strong>CHATBOT</strong></span>
</div>

<div class="bot-welcome">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png"
class="bot-img">

<div class="chat-bubble">
Ask me any medical question<br>
<span>I will provide safe health advice.</span>
</div>
</div>

</div>

<!-- CHAT AREA -->
<div id="chatBox" class="chat-area"></div>

<!-- SUGGESTIONS -->
<div class="suggestions">

<button class="suggestion-btn" onclick="sendSuggestion('What are symptoms of fever?')">
Fever symptoms
</button>

<button class="suggestion-btn" onclick="sendSuggestion('How to treat cold at home?')">
Cold treatment
</button>

<button class="suggestion-btn" onclick="sendSuggestion('What are symptoms of diabetes?')">
Diabetes symptoms
</button>

<button class="suggestion-btn" onclick="sendSuggestion('How to reduce headache?')">
Headache relief
</button>

</div>

<!-- INPUT -->
<form id="chatForm" class="chat-input-bar">
<div class="input-wrapper-bottom">

<input type="text"
id="message"
name="user_input"
placeholder="Ask medical question..."
required>

<button type="submit">➤</button>

</div>
</form>

</div>
</div>

<script>

const chatBox = document.getElementById("chatBox")

// SEND SUGGESTION
function sendSuggestion(text){
document.getElementById("message").value=text
document.getElementById("chatForm").dispatchEvent(new Event("submit"))
}

// FORMAT BOT RESPONSE
function formatReply(text){

// convert * bullets to html
text = text.replace(/\*\*(.*?)\*\*/g,"<b>$1</b>")
text = text.replace(/\n/g,"<br>")

// convert - to bullet
text = text.replace(/- (.*?)(<br>|$)/g,"<li>$1</li>")

if(text.includes("<li>")){
text = "<ul>"+text+"</ul>"
}

return text
}

document.getElementById("chatForm").onsubmit = async function(e){

e.preventDefault()

let msg = document.getElementById("message").value.trim()
if(!msg) return

chatBox.innerHTML += `
<div class="message user">${msg}</div>
`

document.getElementById("message").value=""

chatBox.scrollTop = chatBox.scrollHeight

let response = await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"user_input="+encodeURIComponent(msg)
})

let data = await response.json()

let formatted = formatReply(data.reply)

chatBox.innerHTML += `
<div class="message bot">${formatted}</div>
`

chatBox.scrollTop = chatBox.scrollHeight

}

</script>

</body>
</html>
